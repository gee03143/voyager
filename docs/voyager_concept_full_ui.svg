  <desc>노을 바다에 흐릿한 다른 배·항로 흔적·표류 병이 있고, 왼쪽에 시계·할일·습관·기록 도크와 항해 버튼, 오른쪽 위에 안구·기어 옵션 버튼이 배치된 화면.</desc>

